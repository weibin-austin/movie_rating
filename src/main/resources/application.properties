spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost/movie_rating
spring.datasource.username=root
spring.datasource.password=12345678

spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.org.springframework.cache=TRACE

# Cache expiration: Caffeine evicts entries 10 minutes after they are written,
# so popular lists and movie lookups refresh as new ratings come in
spring.cache.type=caffeine
spring.cache.cache-names=movieCache,popularMovieCache,charactCache
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=1000

# springfox 2.9.2 requires the ant path matcher (Spring Boot 2.6+ defaults to path_pattern_parser)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

app.jwtSecret= JWTSuperSecretKey
app.jwtExpirationInMs = 604800000
